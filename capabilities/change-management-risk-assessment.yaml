naftiko: 1.0.0-alpha2
info:
  label: Prosci Change Management API — Risk Assessment
  description: 'Prosci Change Management API — Risk Assessment. 2 operations. Lead operation: Prosci Get project risk assessment.
    Self-contained Naftiko capability covering one Prosci business surface.'
  tags:
  - Prosci
  - Risk Assessment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PROSCI_API_KEY: PROSCI_API_KEY
capability:
  consumes:
  - type: http
    namespace: change-management-risk-assessment
    baseUri: https://api.prosci.com/v1
    description: Prosci Change Management API — Risk Assessment business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-risk-assessment
      path: /projects/{projectId}/risk-assessment
      operations:
      - name: getriskassessment
        method: GET
        description: Prosci Get project risk assessment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateriskassessment
        method: PUT
        description: Prosci Update project risk assessment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PROSCI_API_KEY}}'
  exposes:
  - type: rest
    namespace: change-management-risk-assessment-rest
    port: 8080
    description: REST adapter for Prosci Change Management API — Risk Assessment. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/risk-assessment
      name: projects-projectid-risk-assessment
      description: REST surface for projects-projectId-risk-assessment.
      operations:
      - method: GET
        name: getriskassessment
        description: Prosci Get project risk assessment
        call: change-management-risk-assessment.getriskassessment
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateriskassessment
        description: Prosci Update project risk assessment
        call: change-management-risk-assessment.updateriskassessment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: change-management-risk-assessment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prosci Change Management API — Risk Assessment. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: prosci-get-project-risk-assessment
      description: Prosci Get project risk assessment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-risk-assessment.getriskassessment
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-update-project-risk-assessment
      description: Prosci Update project risk assessment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: change-management-risk-assessment.updateriskassessment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
