naftiko: 1.0.0-alpha2
info:
  label: Prosci Change Management API — Training
  description: 'Prosci Change Management API — Training. 3 operations. Lead operation: Prosci List training enrollments. Self-contained
    Naftiko capability covering one Prosci business surface.'
  tags:
  - Prosci
  - Training
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PROSCI_API_KEY: PROSCI_API_KEY
capability:
  consumes:
  - type: http
    namespace: change-management-training
    baseUri: https://api.prosci.com/v1
    description: Prosci Change Management API — Training business capability. Self-contained, no shared references.
    resources:
    - name: training-enrollments
      path: /training/enrollments
      operations:
      - name: listenrollments
        method: GET
        description: Prosci List training enrollments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by enrollment status
      - name: createenrollment
        method: POST
        description: Prosci Enroll in a training program
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: training-programs
      path: /training/programs
      operations:
      - name: listtrainingprograms
        method: GET
        description: Prosci List training programs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: Filter by delivery format
        - name: programType
          in: query
          type: string
          description: Filter by program type
    authentication:
      type: bearer
      token: '{{env.PROSCI_API_KEY}}'
  exposes:
  - type: rest
    namespace: change-management-training-rest
    port: 8080
    description: REST adapter for Prosci Change Management API — Training. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/training/enrollments
      name: training-enrollments
      description: REST surface for training-enrollments.
      operations:
      - method: GET
        name: listenrollments
        description: Prosci List training enrollments
        call: change-management-training.listenrollments
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createenrollment
        description: Prosci Enroll in a training program
        call: change-management-training.createenrollment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/training/programs
      name: training-programs
      description: REST surface for training-programs.
      operations:
      - method: GET
        name: listtrainingprograms
        description: Prosci List training programs
        call: change-management-training.listtrainingprograms
        with:
          format: rest.format
          programType: rest.programType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: change-management-training-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prosci Change Management API — Training. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prosci-list-training-enrollments
      description: Prosci List training enrollments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-training.listenrollments
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-enroll-training-program
      description: Prosci Enroll in a training program
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: change-management-training.createenrollment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-list-training-programs
      description: Prosci List training programs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-training.listtrainingprograms
      with:
        format: tools.format
        programType: tools.programType
      outputParameters:
      - type: object
        mapping: $.
