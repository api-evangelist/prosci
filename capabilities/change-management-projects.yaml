naftiko: 1.0.0-alpha2
info:
  label: Prosci Change Management API — Projects
  description: 'Prosci Change Management API — Projects. 5 operations. Lead operation: Prosci List change projects. Self-contained
    Naftiko capability covering one Prosci business surface.'
  tags:
  - Prosci
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PROSCI_API_KEY: PROSCI_API_KEY
capability:
  consumes:
  - type: http
    namespace: change-management-projects
    baseUri: https://api.prosci.com/v1
    description: Prosci Change Management API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: Prosci List change projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter projects by status
        - name: sponsorId
          in: query
          type: string
          description: Filter projects by executive sponsor identifier
      - name: createproject
        method: POST
        description: Prosci Create a change project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId
      path: /projects/{projectId}
      operations:
      - name: getproject
        method: GET
        description: Prosci Get a change project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateproject
        method: PUT
        description: Prosci Update a change project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteproject
        method: DELETE
        description: Prosci Delete a change project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PROSCI_API_KEY}}'
  exposes:
  - type: rest
    namespace: change-management-projects-rest
    port: 8080
    description: REST adapter for Prosci Change Management API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: listprojects
        description: Prosci List change projects
        call: change-management-projects.listprojects
        with:
          status: rest.status
          sponsorId: rest.sponsorId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: Prosci Create a change project
        call: change-management-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}
      name: projects-projectid
      description: REST surface for projects-projectId.
      operations:
      - method: GET
        name: getproject
        description: Prosci Get a change project
        call: change-management-projects.getproject
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateproject
        description: Prosci Update a change project
        call: change-management-projects.updateproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteproject
        description: Prosci Delete a change project
        call: change-management-projects.deleteproject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: change-management-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prosci Change Management API — Projects. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prosci-list-change-projects
      description: Prosci List change projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-projects.listprojects
      with:
        status: tools.status
        sponsorId: tools.sponsorId
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-create-change-project
      description: Prosci Create a change project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: change-management-projects.createproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-get-change-project
      description: Prosci Get a change project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-projects.getproject
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-update-change-project
      description: Prosci Update a change project
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: change-management-projects.updateproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: prosci-delete-change-project
      description: Prosci Delete a change project
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: change-management-projects.deleteproject
      outputParameters:
      - type: object
        mapping: $.
