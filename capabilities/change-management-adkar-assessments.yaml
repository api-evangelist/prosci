        description: Prosci Create an ADKAR assessment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-adkar-assessments-assessmentId
      path: /projects/{projectId}/adkar-assessments/{assessmentId}
      operations:
      - name: getadkarassessment
        method: GET
