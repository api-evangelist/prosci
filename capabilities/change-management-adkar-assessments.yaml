      name: projects-projectid-adkar-assessments
      description: REST surface for projects-projectId-adkar-assessments.
      operations:
      - method: GET
        name: listadkarassessments
        description: Prosci List ADKAR assessments
        call: change-management-adkar-assessments.listadkarassessments
        with:
          stakeholderId: rest.stakeholderId
          groupId: rest.groupId
        outputParameters:
        - type: object
          mapping: $.
