naftiko: 1.0.0-alpha2
info:
  label: Prosci Change Management API — ADKAR Assessments
  description: 'Prosci Change Management API — ADKAR Assessments. 4 operations. Lead operation: Prosci List ADKAR assessments.
    Self-contained Naftiko capability covering one Prosci business surface.'
  tags:
