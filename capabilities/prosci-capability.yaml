    namespace: prosci
    baseUri: https://api.prosci.com/v1
    description: Prosci Change Management API HTTP API.
    authentication:
      type: bearer
      token: '{{PROSCI_TOKEN}}'
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: Prosci List change projects
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter projects by status
        - name: sponsorId
          in: query
          type: string
          description: Filter projects by executive sponsor identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Prosci Create a change project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
